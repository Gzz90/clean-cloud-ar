<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #container { width: 100vw; height: 100vh; }
      
      /* Интерфейс поверх AR */
      #ui-overlay {
        position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
        display: none; flex-direction: column; gap: 10px; z-index: 10;
      }
      .btn {
        padding: 15px 30px; background: #e91e63; color: white; border: none;
        border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; text-decoration: none;
      }
      #promo-display {
        display: none; padding: 20px; background: white; border-radius: 15px;
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; border: 3px solid #e91e63; z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <div id="ui-overlay">
      <button class="btn" id="claim-btn">Забрать баллы</button>
      <a href="https://your-site.com" class="btn" style="background: #fff; color: #e91e63;">На сайт</a>
    </div>

    <div id="promo-display">
      <p>Твой промокод:</p>
      <h2 id="promo-code">CLEAN2026</h2>
      <button onclick="copyPromo()">Копировать</button>
      <button onclick="document.getElementById('promo-display').style.display='none'">Закрыть</button>
    </div>

    <script>
      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: document.querySelector("#container"),
        imageTargetSrc: './targets.mind', // Путь к файлу-маркеру
      });

      const {renderer, scene, camera} = mindarThree;
      const loader = new THREE.GLTFLoader();
      const anchor = mindarThree.addAnchor(0); // Привязка к первому маркеру
      let mixer; // Для анимаций

      // Освещение
      const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
      scene.add(light);

      // Загрузка 3D модели Облака
      loader.load('./cloudie.glb', (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.5, 0.5, 0.5); // Масштабируем
        anchor.group.add(model);

        // Настройка анимаций
        mixer = new THREE.AnimationMixer(model);
        const action = mixer.clipAction(gltf.animations[0]); // Анимация появления/махания
        action.play();
      });

      // События обнаружения маркера
      anchor.onTargetFound = () => {
        document.getElementById('ui-overlay').style.display = 'flex';
      };
      anchor.onTargetLost = () => {
        document.getElementById('ui-overlay').style.display = 'none';
      };

      // Логика кнопки промокода
      document.getElementById('claim-btn').addEventListener('click', () => {
        document.getElementById('promo-display').style.display = 'block';
      });

      function copyPromo() {
        const code = document.getElementById('promo-code').innerText;
        navigator.clipboard.writeText(code);
        alert("Промокод скопирован!");
      }

      const start = async () => {
        await mindarThree.start();
        renderer.setAnimationLoop(() => {
          const delta = new THREE.Clock().getDelta();
          if (mixer) mixer.update(delta); // Обновляем анимацию персонажа
          renderer.render(scene, camera);
        });
      }
      start();
    </script>
  </body>
</html>
