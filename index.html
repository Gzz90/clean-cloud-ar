<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Cloud AR</title>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #container { width: 100vw; height: 100vh; }
      
      /* Интерфейс поверх AR */
      #ui-overlay {
        position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
        display: none; flex-direction: column; gap: 10px; z-index: 10;
      }
      .btn {
        padding: 15px 30px; background: #e91e63; color: white; border: none;
        border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; text-decoration: none;
      }
      #promo-display {
        display: none; padding: 20px; background: white; border-radius: 15px;
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; border: 3px solid #e91e63; z-index: 20; width: 250px;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <div id="ui-overlay">
      <button class="btn" id="claim-btn">Забрать баллы</button>
      <a href="https://your-site.com" class="btn" style="background: #fff; color: #e91e63;">На сайт</a>
    </div>

    <div id="promo-display">
      <p>Твой промокод:</p>
      <h2 id="promo-code">CLEAN2026</h2>
      <button onclick="copyPromo()">Копировать</button>
      <button onclick="document.getElementById('promo-display').style.display='none'">Закрыть</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
      import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js';

      // Делаем функции доступными для HTML-кнопок
      window.copyPromo = function() {
        const code = document.getElementById('promo-code').innerText;
        navigator.clipboard.writeText(code);
        alert("Промокод скопирован!");
      };

      const start = async () => {
        const mindarThree = new MindARThree({
          container: document.querySelector("#container"),
          imageTargetSrc: './targets.mind', // Убедись, что этот файл есть в папке!
        });

        const {renderer, scene, camera} = mindarThree;

        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        const anchor = mindarThree.addAnchor(0);

        // Красный куб-заглушка
        const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const material = new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.7});
        const cube = new THREE.Mesh(geometry, material);
        anchor.group.add(cube);

        anchor.onTargetFound = () => {
          document.getElementById('ui-overlay').style.display = 'flex';
        };
        anchor.onTargetLost = () => {
          document.getElementById('ui-overlay').style.display = 'none';
        };

        await mindarThree.start();
        
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
        });
      };

      // Слушатель для кнопки
      document.getElementById('claim-btn').addEventListener('click', () => {
        document.getElementById('promo-display').style.display = 'block';
      });

      start();
    </script>
  </body>
</html>
